# Dev-mode Docker Compose — brings up the FastAPI backend and the Next.js
# frontend together, mirroring the local `uvicorn --reload` / `npm run dev`
# workflow documented in README.md. Not a production deployment config (no
# multi-stage build, no reverse proxy, no TLS).
#
# Prerequisites (see docs/docker-setup.md):
#   - backend/.env         (copy from backend/.env.example, fill in real values)
#   - frontend/.env.local     (copy from frontend/.env.example)
# Neither file is created by this compose file — both are gitignored and
# must contain real credentials only you have.
#
# Usage:
#   docker compose up --build

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      # Bind-mount source for --reload live-editing; jobs.db (SQLite) lives
      # inside backend/ and persists on the host through this same mount —
      # no separate named volume needed (see CLAUDE.md: SQLite is the actual
      # active datastore, DATABASE_URL/Postgres is unwired/aspirational).
      - ./backend:/app/backend
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env.local
    environment:
      # Overrides whatever BACKEND_URL is in .env.local: inside the compose
      # network the backend is reachable at the service name `backend`, not
      # 127.0.0.1 (next.config.mjs's rewrite proxy reads this server-side).
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      # Anonymous volumes so the container's own Linux node_modules/.next
      # aren't shadowed by the host's (macOS/Windows) bind mount above.
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
